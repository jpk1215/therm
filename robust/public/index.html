<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Fundraising Thermometer</title>
  <style>
    :root {
      --bg: #ecf7f0;
      --card: #ffffff;
      --text: #08371e;
      --muted: #3f5d4b;
      --primary: #01411c;
      --primary-deep: #022d16;
      --gold: #d8b463;
      --gold-soft: #f4e4bc;
      --track: #d9e8de;
      --tick: #5f7d6b;
      --border: #c9ddd0;
      --shadow: 0 16px 40px rgba(1, 65, 28, 0.12);
      --radius: 18px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      color: var(--text);
      background: linear-gradient(180deg, #ffffff, var(--bg));
    }

    body.display-viewport {
      height: 100vh;
      overflow: hidden;
      background: radial-gradient(circle at 50% 10%, #f9efcf, #efe0b8 62%, #e8d7aa 100%);
    }

    .container {
      width: min(1080px, 100% - 2.5rem);
      margin: 2rem auto 3rem;
      display: grid;
      grid-template-columns: minmax(300px, 380px) 1fr;
      gap: 1.5rem;
      align-items: start;
    }

    .container.display-mode {
      grid-template-columns: 1fr;
      width: min(860px, 100% - 1rem);
      height: 100vh;
      margin: 0 auto;
      padding: 0.2rem 0;
      align-items: stretch;
    }

    .container.control-mode {
      grid-template-columns: minmax(320px, 380px) minmax(520px, 1fr);
      width: min(1080px, 100% - 2rem);
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .controls {
      padding: 1.6rem;
    }

    .controls.hidden {
      display: none;
    }

    h1 {
      margin: 0 0 0.5rem;
      font-size: 1.6rem;
      line-height: 1.15;
      letter-spacing: -0.01em;
    }

    .subtitle {
      margin: 0 0 1.35rem;
      color: var(--muted);
      font-size: 1rem;
    }

    .field {
      margin-bottom: 1.05rem;
    }

    label {
      display: inline-block;
      margin-bottom: 0.45rem;
      font-size: 0.93rem;
      font-weight: 600;
    }

    input[type="number"] {
      width: 100%;
      padding: 0.82rem 0.9rem;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      font-size: 1rem;
      color: var(--text);
      background: #fff;
      transition: border-color 150ms ease, box-shadow 150ms ease;
    }

    input[type="number"]:focus {
      outline: none;
      border-color: #0b6f35;
      box-shadow: 0 0 0 4px rgba(11, 111, 53, 0.12);
    }

    .status {
      margin-top: 1.15rem;
      margin-bottom: 0;
      padding: 0.75rem 0.85rem;
      background: #f3faf5;
      border: 1px solid #d7e9dc;
      border-radius: 12px;
      font-size: 0.92rem;
      color: var(--muted);
    }

    .status strong {
      color: var(--text);
    }

    .display {
      padding: 1.6rem 1.6rem 1.4rem 2.2rem;
      min-height: 580px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      position: relative;
      overflow: hidden;
    }

    .display::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      bottom: 0;
      width: 24px;
      background: linear-gradient(180deg, #036a2f, var(--primary));
    }

    .display::after {
      content: "☪ ★";
      position: absolute;
      top: 0.9rem;
      right: 1rem;
      font-size: 1.05rem;
      color: rgba(1, 65, 28, 0.7);
      letter-spacing: 0.08rem;
    }

    .festival-header {
      display: none;
    }

    .arch-frame {
      display: contents;
    }

    .display-cta {
      display: none;
    }

    .amounts {
      display: flex;
      flex-wrap: wrap;
      gap: 0.8rem 0.95rem;
      margin-bottom: 1.2rem;
      font-size: 0.95rem;
    }

    .amounts > div {
      padding: 0.7rem 0.82rem;
      border: 1px solid #d8e8dd;
      border-radius: 12px;
      background: #f8fcf9;
      min-width: 138px;
    }

    .amounts > div span:first-child {
      color: var(--muted);
      font-weight: 600;
    }

    .amounts .value {
      font-size: 1.24rem;
      font-weight: 700;
      color: var(--text);
    }

    .thermometer-wrap {
      flex: 1;
      min-height: 390px;
      display: flex;
      justify-content: center;
      align-items: flex-end;
      padding: 1rem 0.8rem 0.4rem;
    }

    .thermometer {
      position: relative;
      width: min(420px, 100%);
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 1rem;
    }

    .scale {
      position: relative;
      height: clamp(300px, 52vh, 500px);
      width: 146px;
    }

    .track {
      position: absolute;
      right: 0;
      bottom: 46px;
      width: 58px;
      height: calc(100% - 56px);
      background: var(--track);
      border-radius: 999px;
      border: 1px solid #cadecf;
      box-shadow: inset 0 0 0 2px rgba(255, 255, 255, 0.5);
      overflow: hidden;
    }

    .fill {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 0;
      background: linear-gradient(180deg, #11a04a, var(--primary));
      border-top: 2px solid rgba(255, 255, 255, 0.35);
      transition: height 250ms ease;
    }

    .bulb {
      position: absolute;
      right: -9px;
      bottom: 0;
      width: 76px;
      height: 76px;
      border-radius: 50%;
      background: var(--primary);
      border: 1px solid #013017;
      box-shadow: inset 0 -6px 10px rgba(0, 0, 0, 0.16);
    }

    .tick-list {
      position: absolute;
      left: 0;
      right: 70px;
      bottom: 56px;
      height: calc(100% - 66px);
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .tick-list li {
      position: absolute;
      left: 0;
      transform: translateY(50%);
      display: flex;
      align-items: center;
      gap: 0.4rem;
      white-space: nowrap;
      color: var(--tick);
      font-size: 0.86rem;
      font-weight: 600;
      line-height: 1;
    }

    .tick-mark {
      width: 24px;
      height: 2px;
      background: var(--tick);
    }

    @media (max-width: 780px) {
      .container {
        grid-template-columns: 1fr;
        width: min(700px, 100% - 1.25rem);
      }

      .display {
        min-height: 500px;
      }
    }

    @media (max-width: 900px) {
      .container.control-mode {
        grid-template-columns: 1fr;
        width: min(700px, 100% - 1.25rem);
      }
    }

    @media (max-width: 430px) {
      .controls,
      .display {
        padding: 1rem;
      }

      h1 {
        font-size: 1.32rem;
      }

      .display::before {
        width: 14px;
      }

      .scale {
        width: 122px;
      }

      .track {
        width: 50px;
      }

      .bulb {
        width: 66px;
        height: 66px;
      }
    }

    .container.display-mode .display {
      width: min(840px, 100%);
      margin: 0 auto;
      height: 100%;
      min-height: 0;
      max-height: 100%;
      padding: clamp(0.55rem, 1.2vh, 0.9rem) clamp(0.95rem, 2.2vw, 1.35rem) clamp(0.45rem, 1.1vh, 0.8rem);
      border: 2px solid #ddbf76;
      border-radius: min(34vw, 320px) min(34vw, 320px) 30px 30px;
      box-shadow:
        0 28px 56px rgba(78, 56, 12, 0.2),
        inset 0 0 0 4px rgba(249, 232, 190, 0.85);
      background:
        radial-gradient(circle at 50% 18%, rgba(251, 243, 219, 0.95), rgba(248, 235, 201, 0.88) 38%, rgba(244, 228, 188, 0.6) 60%, rgba(242, 225, 182, 0.35) 100%),
        linear-gradient(180deg, #f8ebca 0%, #f4e1b8 100%);
      overflow: hidden;
    }

    .container.display-mode .display::before {
      display: none;
    }

    .container.display-mode .display::after {
      display: none;
    }

    .container.display-mode .festival-header {
      display: block;
      text-align: center;
      margin-top: 0;
      margin-bottom: clamp(0.1rem, 0.55vh, 0.28rem);
      position: relative;
      z-index: 2;
    }

    .container.display-mode .festival-header h2 {
      margin: 0;
      font-size: clamp(1.8rem, 4.8vw, 3rem);
      line-height: 1.01;
      letter-spacing: -0.01em;
      font-weight: 700;
      color: #8d6208;
      text-shadow: 0 2px 0 rgba(255, 255, 255, 0.65);
      font-family: "Brush Script MT", "Apple Chancery", "Georgia", "Times New Roman", serif;
    }

    .container.display-mode .festival-header p {
      margin: 0.16rem 0 0;
      font-size: clamp(0.8rem, 1.5vw, 0.95rem);
      font-weight: 700;
      color: #7a5a17;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }

    .container.display-mode .festival-crescent {
      display: inline-block;
      margin-bottom: 0;
      font-size: clamp(1.4rem, 2.8vw, 1.85rem);
      color: #cca13e;
      text-shadow: 0 1px 0 rgba(255, 255, 255, 0.8);
    }

    .container.display-mode .arch-frame {
      display: grid;
      grid-template-rows: auto 1fr;
      gap: clamp(0.12rem, 0.45vh, 0.28rem);
      flex: 1;
      min-height: 0;
      padding: clamp(0.28rem, 0.7vh, 0.5rem) clamp(0.42rem, 1vw, 0.65rem) clamp(0.25rem, 0.65vh, 0.45rem);
      border: 2px solid rgba(206, 163, 69, 0.7);
      border-radius: 250px 250px 24px 24px;
      background: linear-gradient(180deg, rgba(255, 252, 245, 0.78), rgba(250, 240, 213, 0.62));
      box-shadow: inset 0 0 0 3px rgba(248, 231, 190, 0.7);
    }

    .container.display-mode .amounts {
      justify-content: center;
      gap: 0.65rem;
      margin-bottom: 0;
    }

    .container.display-mode .amounts > div {
      min-width: clamp(130px, 19vw, 165px);
      text-align: center;
      padding: 0.55rem 0.78rem;
      border: 2px solid rgba(195, 150, 50, 0.68);
      background: linear-gradient(180deg, #fffdf8 0%, #f6e7bf 100%);
      box-shadow:
        0 5px 14px rgba(118, 83, 21, 0.12),
        inset 0 1px 0 rgba(255, 255, 255, 0.9);
    }

    .container.display-mode .amounts .value {
      font-size: clamp(1.15rem, 2.9vw, 1.5rem);
      font-weight: 800;
      color: #114b2d;
      letter-spacing: -0.01em;
    }

    .container.display-mode .thermometer-wrap {
      min-height: 0;
      height: 100%;
      padding: clamp(0.05rem, 0.2vh, 0.12rem) 0.2rem 0.05rem;
      align-items: center;
    }

    .container.display-mode .thermometer {
      width: min(560px, 100%);
      gap: 1.35rem;
      padding: 0.1rem 0.1rem 0;
      border-radius: 26px;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.44), rgba(250, 238, 209, 0.34));
      border: 1px solid rgba(200, 160, 70, 0.36);
    }

    .container.display-mode .scale {
      width: 196px;
      height: clamp(410px, 58vh, 620px);
    }

    .container.display-mode .track {
      width: 78px;
      right: 0;
      border: 2px solid rgba(178, 133, 35, 0.8);
      background: linear-gradient(180deg, rgba(252, 248, 232, 0.9), rgba(240, 224, 181, 0.86));
      box-shadow:
        inset 0 0 0 2px rgba(255, 255, 255, 0.7),
        0 14px 30px rgba(78, 56, 12, 0.12);
    }

    .container.display-mode .fill {
      background:
        radial-gradient(circle at 60% 20%, rgba(180, 255, 184, 0.52), transparent 45%),
        linear-gradient(180deg, #37d66d 0%, #14a54e 44%, #087337 100%);
      border-top: 2px solid rgba(255, 255, 255, 0.5);
    }

    .container.display-mode .bulb {
      width: 100px;
      height: 100px;
      right: -12px;
      border: 2px solid rgba(182, 133, 30, 0.82);
      background:
        radial-gradient(circle at 35% 28%, rgba(154, 255, 154, 0.58), rgba(27, 156, 64, 0.74) 34%, #0c7e3b 64%, #075829 100%);
      box-shadow:
        inset 0 -10px 14px rgba(0, 0, 0, 0.22),
        0 12px 24px rgba(35, 90, 49, 0.2);
    }

    .container.display-mode .tick-list {
      right: 94px;
    }

    .container.display-mode .tick-list li {
      font-size: clamp(0.95rem, 2.1vw, 1.16rem);
      font-weight: 700;
      color: #3f3110;
      text-shadow: 0 1px 0 rgba(255, 255, 255, 0.78);
    }

    .container.display-mode .tick-mark {
      width: 34px;
      height: 3px;
      background: #9a7533;
    }

    .container.display-mode .display-cta {
      display: block;
      margin: clamp(0.08rem, 0.3vh, 0.18rem) auto 0;
      width: min(460px, 92%);
      text-align: center;
      padding: clamp(0.34rem, 0.7vh, 0.5rem) 1rem clamp(0.38rem, 0.75vh, 0.56rem);
      border-radius: 20px;
      border: 2px solid rgba(178, 133, 35, 0.75);
      background: linear-gradient(180deg, #fffaf0 0%, #f3ddb0 100%);
      color: #6a4a05;
      font-size: clamp(1.3rem, 3.5vw, 1.8rem);
      font-weight: 700;
      letter-spacing: -0.01em;
      font-family: "Georgia", "Times New Roman", serif;
      box-shadow:
        0 8px 18px rgba(118, 83, 21, 0.12),
        inset 0 1px 0 rgba(255, 255, 255, 0.9);
    }

    .container.control-mode .display {
      order: 2;
      min-height: auto;
      padding: 1.2rem 1.2rem 1rem 1.8rem;
    }

    .container.control-mode .controls {
      order: 1;
      padding-top: 1.2rem;
    }

    .container.control-mode .thermometer-wrap {
      min-height: 260px;
      padding-top: 0.6rem;
    }

    .container.control-mode .thermometer {
      width: min(340px, 100%);
    }

    .container.control-mode .scale {
      width: 126px;
      height: clamp(240px, 34vh, 300px);
    }

    .container.control-mode .track {
      width: 50px;
    }

    .container.control-mode .bulb {
      width: 64px;
      height: 64px;
      right: -7px;
    }

    .container.control-mode .tick-list {
      right: 62px;
    }

    .container.control-mode .tick-list li {
      font-size: 0.82rem;
    }

    .container.control-mode .tick-mark {
      width: 20px;
      height: 2px;
    }

    .container.control-mode .festival-header,
    .container.control-mode .display-cta {
      display: none !important;
    }

    .container.control-mode .arch-frame {
      display: contents;
      padding: 0;
      border: 0;
      background: transparent;
      box-shadow: none;
    }
  </style>
</head>
<body>
  <main class="container" id="container">
    <section class="card controls" id="controls">
      <h1>Fundraising Thermometer</h1>
      <p class="subtitle" id="subtitle">Use control mode on your phone to update the live display.</p>

      <div class="field">
        <label for="maxValue">Goal / Max Value</label>
        <input id="maxValue" type="number" min="1" step="1" value="100000">
      </div>

      <div class="field">
        <label for="currentValue">Current Value</label>
        <input id="currentValue" type="number" min="0" step="1" value="1250">
      </div>

      <p class="status" id="statusText"><strong>Status:</strong> Initializing...</p>
    </section>

    <section class="card display" aria-live="polite">
      <div class="festival-header">
        <div class="festival-crescent">☾ ✦</div>
        <h2>Ramadan Fundraiser</h2>
        <p>Community Giving Night</p>
      </div>

      <div class="arch-frame">
      <div class="amounts">
        <div><span>Raised:</span> <span class="value" id="raisedText">$0</span></div>
        <div><span>Goal:</span> <span class="value" id="goalText">$0</span></div>
        <div><span>Progress:</span> <span class="value" id="percentText">0%</span></div>
      </div>

      <div class="thermometer-wrap">
        <div class="thermometer">
          <div class="scale">
            <ul class="tick-list" id="tickList"></ul>
            <div class="track">
              <div class="fill" id="fill"></div>
            </div>
            <div class="bulb"></div>
          </div>
        </div>
      </div>
      </div>

      <p class="display-cta">Donate Generously</p>
    </section>
  </main>

  <script>
    const DEFAULT_STATE = {
      maxValue: 100000,
      currentValue: 1250
    };
    const POLL_MS = 1500;
    const params = new URLSearchParams(window.location.search);
    const mode = params.get("mode") === "control" ? "control" : "display";
    const campaign = params.get("campaign") || "default";
    const tokenParam = params.get("token");
    const tokenStorageKey = "therm-admin-token:" + campaign;

    if (tokenParam) {
      localStorage.setItem(tokenStorageKey, tokenParam);
      params.delete("token");
      const cleanQuery = params.toString();
      history.replaceState(null, "", window.location.pathname + (cleanQuery ? "?" + cleanQuery : ""));
    }

    const adminToken = localStorage.getItem(tokenStorageKey) || "";

    const containerEl = document.getElementById("container");
    const controlsEl = document.getElementById("controls");
    const subtitleEl = document.getElementById("subtitle");
    const statusTextEl = document.getElementById("statusText");
    const maxInput = document.getElementById("maxValue");
    const currentInput = document.getElementById("currentValue");
    const fillEl = document.getElementById("fill");
    const tickListEl = document.getElementById("tickList");
    const raisedTextEl = document.getElementById("raisedText");
    const goalTextEl = document.getElementById("goalText");
    const percentTextEl = document.getElementById("percentText");
    const controlInputs = [maxInput, currentInput];
    let isEditing = false;
    let suppressRemoteUntilMs = 0;

    if (mode === "display") {
      document.body.classList.add("display-viewport");
      controlsEl.classList.add("hidden");
      containerEl.classList.add("display-mode");
    } else {
      containerEl.classList.add("control-mode");
      subtitleEl.textContent = "Control mode is active. Updates are synced to the live display.";
    }

    function toPositiveNumber(value, fallback) {
      const parsed = Number(value);
      if (!Number.isFinite(parsed)) return fallback;
      return parsed > 0 ? parsed : fallback;
    }

    function toNonNegativeNumber(value, fallback) {
      const parsed = Number(value);
      if (!Number.isFinite(parsed)) return fallback;
      return parsed >= 0 ? parsed : fallback;
    }

    function normalizeState(rawState) {
      const maxValue = toPositiveNumber(rawState?.maxValue, DEFAULT_STATE.maxValue);
      const currentRaw = toNonNegativeNumber(rawState?.currentValue, DEFAULT_STATE.currentValue);
      const currentValue = Math.min(currentRaw, maxValue);
      return { maxValue, currentValue };
    }

    function applyStateToInputs(state) {
      maxInput.value = String(state.maxValue);
      currentInput.value = String(state.currentValue);
    }

    function readStateFromInputs() {
      return normalizeState({
        maxValue: maxInput.value,
        currentValue: currentInput.value
      });
    }

    function formatMoney(value) {
      return new Intl.NumberFormat(undefined, {
        style: "currency",
        currency: "USD",
        maximumFractionDigits: 0
      }).format(value);
    }

    function debounce(callback, delayMs) {
      let timerId;
      return (...args) => {
        clearTimeout(timerId);
        timerId = setTimeout(() => callback(...args), delayMs);
      };
    }

    function setStatus(message, type = "ok") {
      statusTextEl.innerHTML = "<strong>Status:</strong> " + message;
      if (type === "error") {
        statusTextEl.style.background = "#fff4f4";
        statusTextEl.style.borderColor = "#f3cccc";
      } else {
        statusTextEl.style.background = "#f3faf5";
        statusTextEl.style.borderColor = "#d7e9dc";
      }
    }

    function niceStep(rawStep) {
      const safeStep = Math.max(1, rawStep);
      const magnitude = 10 ** Math.floor(Math.log10(safeStep));
      const normalized = safeStep / magnitude;

      if (normalized <= 1) return 1 * magnitude;
      if (normalized <= 2) return 2 * magnitude;
      if (normalized <= 5) return 5 * magnitude;
      return 10 * magnitude;
    }

    function getScaleValues(maxValue) {
      const maxLabels = 9;
      const maxIntervals = maxLabels - 1;
      const step = niceStep(maxValue / maxIntervals);

      const values = [0];
      for (let v = step; v < maxValue; v += step) {
        values.push(v);
      }
      values.push(maxValue);
      return values;
    }

    function createTicks(maxValue) {
      tickListEl.innerHTML = "";
      const scaleValues = getScaleValues(maxValue);

      for (const tickValue of scaleValues) {
        const positionPercent = (tickValue / maxValue) * 100;

        const li = document.createElement("li");
        li.style.bottom = positionPercent + "%";

        const mark = document.createElement("span");
        mark.className = "tick-mark";

        const label = document.createElement("span");
        label.textContent = formatMoney(tickValue);

        li.appendChild(mark);
        li.appendChild(label);
        tickListEl.appendChild(li);

      }
    }

    function renderThermometer(state, options = {}) {
      const shouldSyncInputs = options.syncInputs !== false;
      const normalized = normalizeState(state);
      const percent = (normalized.currentValue / normalized.maxValue) * 100;
      fillEl.style.height = percent + "%";
      raisedTextEl.textContent = formatMoney(normalized.currentValue);
      goalTextEl.textContent = formatMoney(normalized.maxValue);
      percentTextEl.textContent = Math.round(percent) + "%";
      createTicks(normalized.maxValue);

      if (mode === "control" && shouldSyncInputs) {
        applyStateToInputs(normalized);
      }
    }

    async function fetchState() {
      const response = await fetch("/api/state?campaign=" + encodeURIComponent(campaign), { cache: "no-store" });
      if (!response.ok) {
        throw new Error("Failed to fetch");
      }
      return response.json();
    }

    async function pushState() {
      if (mode !== "control") return;
      if (!adminToken) {
        setStatus("Missing token. Open control URL with ?token=YOUR_ADMIN_WRITE_TOKEN", "error");
        return;
      }

      const state = readStateFromInputs();
      suppressRemoteUntilMs = Date.now() + (POLL_MS * 2);
      renderThermometer(state, { syncInputs: false });
      setStatus("Syncing update...");

      const response = await fetch("/api/state?campaign=" + encodeURIComponent(campaign), {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "x-admin-token": adminToken
        },
        body: JSON.stringify(state)
      });

      if (!response.ok) {
        throw new Error("Write failed");
      }

      setStatus("Live and synced.");
    }

    const debouncedPush = debounce(() => {
      pushState().catch(() => {
        setStatus("Could not sync update. Check token/connection.", "error");
      });
    }, 220);

    if (mode === "control") {
      for (const input of controlInputs) {
        input.addEventListener("focus", () => {
          isEditing = true;
        });
        input.addEventListener("blur", () => {
          isEditing = false;
        });
      }
      maxInput.addEventListener("input", debouncedPush);
      currentInput.addEventListener("input", debouncedPush);
      maxInput.addEventListener("input", () => {
        suppressRemoteUntilMs = Date.now() + (POLL_MS * 2);
      });
      currentInput.addEventListener("input", () => {
        suppressRemoteUntilMs = Date.now() + (POLL_MS * 2);
      });
      maxInput.addEventListener("change", () => {
        pushState().catch(() => {
          setStatus("Could not sync update. Check token/connection.", "error");
        });
      });
      currentInput.addEventListener("change", () => {
        pushState().catch(() => {
          setStatus("Could not sync update. Check token/connection.", "error");
        });
      });
    }

    async function refreshLoop() {
      try {
        const latest = await fetchState();
        const shouldSyncInputs = !(mode === "control" && (isEditing || Date.now() < suppressRemoteUntilMs));
        renderThermometer(latest, { syncInputs: shouldSyncInputs });
        if (mode === "display") {
          setStatus("Display mode live. Campaign: " + campaign);
        } else if (adminToken) {
          setStatus("Control mode live. Campaign: " + campaign);
        } else {
          setStatus("Control mode loaded, but token is missing.", "error");
        }
      } catch (_error) {
        setStatus("Unable to reach live state. Retrying...", "error");
      }
    }

    renderThermometer(DEFAULT_STATE);
    refreshLoop();
    setInterval(refreshLoop, POLL_MS);
  </script>
</body>
</html>
