<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Fundraising Thermometer</title>
  <style>
    :root {
      --bg-ivory: #fbf7ec;
      --bg-ivory-deep: #f2e7cc;
      --gold-deep: #8d6522;
      --gold-mid: #cda14d;
      --emerald-900: #0c6f35;
      --emerald-500: #28b15c;
      --ink: #1f180a;
      --soft-shadow: 0 18px 42px rgba(95, 68, 20, 0.22);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Inter", "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      color: var(--ink);
      background: linear-gradient(180deg, #fffdf7, var(--bg-ivory));
    }

    body.display-viewport {
      height: 100vh;
      overflow: hidden;
      background: radial-gradient(circle at 50% 18%, #fffdfa 0%, #f9f1df 55%, #efe2c6 100%);
    }

    .container {
      width: min(1300px, calc(100% - 2rem));
      margin: 1rem auto;
      display: grid;
      gap: 1.25rem;
      grid-template-columns: 1fr;
      align-items: start;
    }

    .container.control-mode {
      grid-template-columns: minmax(320px, 380px) 1fr;
      align-items: center;
    }

    .controls {
      background: #fff;
      border: 1px solid #e7dbc3;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(71, 50, 13, 0.1);
      padding: 1.25rem;
    }

    .controls.hidden { display: none; }

    h1 {
      margin: 0 0 0.45rem;
      font-size: 1.5rem;
      font-weight: 800;
    }

    .subtitle {
      margin: 0 0 1rem;
      color: #584930;
      font-size: 0.95rem;
    }

    .field { margin-bottom: 0.9rem; }

    label {
      display: inline-block;
      margin-bottom: 0.36rem;
      font-weight: 700;
      font-size: 0.88rem;
    }

    input[type="number"] {
      width: 100%;
      border: 1.5px solid #dcc8a1;
      border-radius: 10px;
      padding: 0.7rem 0.75rem;
      font-size: 1rem;
      color: #231b0d;
    }

    input[type="number"]:focus {
      outline: none;
      border-color: var(--gold-mid);
      box-shadow: 0 0 0 3px rgba(205, 161, 77, 0.2);
    }

    .status {
      margin: 1rem 0 0;
      border-radius: 10px;
      border: 1px solid #e2d5bc;
      background: #fffaf0;
      color: #5e4a20;
      padding: 0.65rem 0.75rem;
      font-size: 0.9rem;
    }

    .display {
      position: relative;
      width: min(860px, 100%);
      margin: 0 auto;
      aspect-ratio: 5 / 8;
      overflow: hidden;
      border-radius: 20px;
      box-shadow: var(--soft-shadow);
      background: linear-gradient(180deg, #fffdf7 0%, #f8eddb 100%);
      isolation: isolate;
    }

    .asset {
      position: absolute;
      display: block;
      user-select: none;
      -webkit-user-drag: none;
      pointer-events: none;
    }

    .texture { inset: 0; opacity: 0.27; }
    .skyline { width: 54%; right: 8%; bottom: 17%; opacity: 0.25; }
    .arch { inset: 0; }
    .trim { width: 80%; left: 10%; top: 8.8%; opacity: 0.17; }

    .lanternA { width: 13%; left: 7%; top: 1.8%; }
    .lanternB { width: 13%; right: 7%; top: 1.8%; }
    .lanternSmallL { width: 8.1%; left: 6.8%; bottom: 6.2%; opacity: 0.9; }
    .lanternSmallR { width: 8.1%; right: 6.8%; bottom: 6.2%; opacity: 0.9; }

    .title-wrap {
      position: absolute;
      top: 10%;
      left: 0;
      width: 100%;
      text-align: center;
    }

    .title {
      margin: 0;
      font-family: "Cormorant Garamond", "Garamond", "Times New Roman", serif;
      font-size: clamp(1.9rem, 4.6vw, 4rem);
      line-height: 1.02;
      font-weight: 700;
      color: #7a4f0f;
      text-shadow: 0 1px 0 rgba(255, 255, 255, 0.9), 0 3px 14px rgba(108, 72, 18, 0.2);
    }

    .divider { width: 34%; left: 33%; top: 17.4%; opacity: 0.88; }
    .crescent { width: 11.5%; left: 44.25%; top: 18.5%; }

    .milestones {
      position: absolute;
      top: 26%;
      left: 11%;
      width: 34%;
    }

    .milestone-row {
      position: relative;
      height: clamp(40px, 4.1vw, 64px);
      margin-bottom: clamp(6px, 0.72vw, 11px);
    }

    .milestone-row img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .milestone-value {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center start;
      padding-left: 8%;
      font-size: clamp(1rem, 2.3vw, 2rem);
      font-weight: 900;
      letter-spacing: 0.01em;
      color: #1d1609;
      text-shadow: 0 1px 0 rgba(255, 255, 255, 0.65);
    }

    .goal-label {
      margin-top: clamp(8px, 1vw, 15px);
      padding-left: 8%;
      font-size: clamp(1.3rem, 2.6vw, 2.2rem);
      font-weight: 900;
      color: #2f2412;
    }

    .amount-plaque {
      position: absolute;
      width: 36%;
      right: 10%;
      top: 31%;
    }

    .amount-plaque .panel { width: 100%; display: block; }
    .amount-plaque .frame { width: 100%; inset: 0; }

    .amount-text {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      text-align: center;
      line-height: 1.05;
    }

    .amount-text .label {
      display: block;
      font-family: "Cormorant Garamond", "Garamond", "Times New Roman", serif;
      font-size: clamp(0.95rem, 2vw, 1.8rem);
      font-weight: 700;
      color: #4a3612;
    }

    .amount-text .value {
      display: block;
      font-size: clamp(1.35rem, 3.4vw, 3rem);
      font-weight: 900;
      letter-spacing: 0.01em;
      color: #1c160d;
    }

    .thermo-area {
      position: absolute;
      width: 26%;
      left: 37%;
      top: 22%;
      height: 57%;
    }

    .fill-clip {
      position: absolute;
      left: 0;
      right: 0;
      top: 0;
      bottom: 17%;
      -webkit-mask-image: url("/ramadan_full_asset_pack/thermometer-fill-mask.svg");
      -webkit-mask-size: contain;
      -webkit-mask-repeat: no-repeat;
      -webkit-mask-position: center top;
      mask-image: url("/ramadan_full_asset_pack/thermometer-fill-mask.svg");
      mask-size: contain;
      mask-repeat: no-repeat;
      mask-position: center top;
    }

    .tube-fill {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 0;
      background:
        radial-gradient(circle at 55% 16%, rgba(178, 255, 188, 0.58), transparent 40%),
        linear-gradient(180deg, #4fe07a 0%, #1fae53 45%, #0d7d3b 100%);
      box-shadow: inset 0 0 24px rgba(10, 130, 55, 0.45), 0 0 24px rgba(32, 177, 77, 0.34);
      transition: height 400ms ease;
    }

    .tube-shell { position: absolute; inset: 0; width: 100%; }

    .bulb-fill {
      position: absolute;
      width: 42%;
      aspect-ratio: 1 / 1;
      left: 29%;
      bottom: 8.8%;
      border-radius: 999px;
      background:
        radial-gradient(circle at 35% 30%, rgba(208, 255, 200, 0.88), rgba(94, 231, 118, 0.6) 34%, rgba(21, 146, 61, 0.82) 66%, rgba(8, 90, 38, 0.95) 100%);
      box-shadow: inset 0 -10px 20px rgba(4, 67, 27, 0.5), 0 0 34px rgba(63, 194, 92, 0.45);
    }

    .bulb-asset { width: 55%; left: 22.5%; bottom: 2%; }
    .cradle { width: 74%; left: 13%; bottom: -3.2%; }

    .flourishL { width: 11%; left: 29%; bottom: 19%; }
    .flourishR { width: 11%; right: 29%; bottom: 19%; }

    .cta-wrap {
      position: absolute;
      left: 23%;
      bottom: 4%;
      width: 54%;
    }

    .cta-wrap img { width: 100%; display: block; }
    .cta-text {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      margin: 0;
      font-family: "Cormorant Garamond", "Garamond", "Times New Roman", serif;
      font-size: clamp(1.65rem, 3.9vw, 3.4rem);
      font-weight: 700;
      color: #3b2a0d;
    }

    .floralL { width: 15%; left: 8%; bottom: 4.8%; opacity: 0.95; }
    .floralR { width: 15%; right: 8%; bottom: 4.8%; opacity: 0.95; }
    .sparkA { width: 3.1%; right: 27%; top: 12.8%; opacity: 0.63; }
    .sparkB { width: 2.5%; left: 24%; top: 15.2%; opacity: 0.48; }
    .sparkDot { width: 1.3%; left: 60%; top: 13.8%; opacity: 0.5; }

    @media (max-width: 960px) {
      .container.control-mode { grid-template-columns: 1fr; }
      .display { width: min(820px, 100%); }
    }
  </style>
</head>
<body>
  <main class="container" id="container">
    <section class="controls" id="controls">
      <h1>Fundraising Thermometer</h1>
      <p class="subtitle" id="subtitle">Use control mode on your phone to update the live display.</p>

      <div class="field">
        <label for="maxValue">Goal / Max Value</label>
        <input id="maxValue" type="number" min="1" step="1" value="3000000">
      </div>

      <div class="field">
        <label for="currentValue">Current Value</label>
        <input id="currentValue" type="number" min="0" step="1" value="1750000">
      </div>

      <p class="status" id="statusText"><strong>Status:</strong> Initializing...</p>
    </section>

    <section class="display" aria-live="polite" aria-label="Ramadan fundraiser thermometer">
      <img class="asset texture" src="/ramadan_full_asset_pack/ivory-speckle-overlay.svg" alt="">
      <img class="asset skyline" src="/ramadan_full_asset_pack/mosque-skyline.svg" alt="">
      <img class="asset arch" src="/ramadan_full_asset_pack/arch-frame-ornate.svg" alt="">
      <img class="asset trim" src="/ramadan_full_asset_pack/islamic-border-pattern.svg" alt="">

      <img class="asset lanternA" src="/ramadan_full_asset_pack/lantern-large-a.svg" alt="">
      <img class="asset lanternB" src="/ramadan_full_asset_pack/lantern-large-b.svg" alt="">
      <img class="asset sparkA" src="/ramadan_full_asset_pack/sparkle-8pt.svg" alt="">
      <img class="asset sparkB" src="/ramadan_full_asset_pack/sparkle-4pt.svg" alt="">
      <img class="asset sparkDot" src="/ramadan_full_asset_pack/sparkle-dot.svg" alt="">

      <header class="title-wrap">
        <h2 class="title">Ramadan Fundraiser</h2>
      </header>
      <img class="asset divider" src="/ramadan_full_asset_pack/ornament-divider-small.svg" alt="">
      <img class="asset crescent" src="/ramadan_full_asset_pack/crescent-topper.svg" alt="">

      <aside class="milestones" id="milestonesPanel">
        <div class="milestone-row">
          <img src="/ramadan_full_asset_pack/milestone-line.svg" alt="">
          <span class="milestone-value" id="milestone0">$3,000,000</span>
        </div>
        <div class="milestone-row">
          <img src="/ramadan_full_asset_pack/milestone-line.svg" alt="">
          <span class="milestone-value" id="milestone1">$2,500,000</span>
        </div>
        <div class="milestone-row">
          <img src="/ramadan_full_asset_pack/milestone-line.svg" alt="">
          <span class="milestone-value" id="milestone2">$2,000,000</span>
        </div>
        <div class="milestone-row">
          <img src="/ramadan_full_asset_pack/milestone-line.svg" alt="">
          <span class="milestone-value" id="milestone3">$1,500,000</span>
        </div>
        <div class="milestone-row">
          <img src="/ramadan_full_asset_pack/milestone-line.svg" alt="">
          <span class="milestone-value" id="milestone4">$1,000,000</span>
        </div>
        <div class="goal-label">GOAL</div>
      </aside>

      <aside class="amount-plaque">
        <img class="panel" src="/ramadan_full_asset_pack/amount-plaque-panel.svg" alt="">
        <img class="asset frame" src="/ramadan_full_asset_pack/amount-plaque-frame.svg" alt="">
        <div class="amount-text">
          <span class="label">Current Amount</span>
          <span class="value" id="currentAmountText">$0</span>
        </div>
      </aside>

      <div class="thermo-area">
        <div class="fill-clip">
          <div class="tube-fill" id="tubeFill"></div>
        </div>
        <img class="asset tube-shell" src="/ramadan_full_asset_pack/thermometer-shell.svg" alt="">
        <div class="bulb-fill" id="bulbFill"></div>
        <img class="asset bulb-asset" src="/ramadan_full_asset_pack/thermometer-bulb.svg" alt="">
        <img class="asset cradle" src="/ramadan_full_asset_pack/bulb-cradle.svg" alt="">
      </div>

      <img class="asset flourishL" src="/ramadan_full_asset_pack/flourish-left.svg" alt="">
      <img class="asset flourishR" src="/ramadan_full_asset_pack/flourish-right.svg" alt="">
      <img class="asset lanternSmallL" src="/ramadan_full_asset_pack/lantern-small.svg" alt="">
      <img class="asset lanternSmallR" src="/ramadan_full_asset_pack/lantern-small.svg" alt="">

      <footer class="cta-wrap">
        <img src="/ramadan_full_asset_pack/cta-plaque.svg" alt="">
        <p class="cta-text">Donate Generously</p>
      </footer>

      <img class="asset floralL" src="/ramadan_full_asset_pack/corner-floral-left.svg" alt="">
      <img class="asset floralR" src="/ramadan_full_asset_pack/corner-floral-right.svg" alt="">
    </section>
  </main>

  <script>
    const DEFAULT_STATE = {
      maxValue: 3000000,
      currentValue: 1750000
    };
    const POLL_MS = 1500;
    const params = new URLSearchParams(window.location.search);
    const mode = params.get("mode") === "control" ? "control" : "display";
    const campaign = params.get("campaign") || "default";
    const tokenParam = params.get("token");
    const tokenStorageKey = "therm-admin-token:" + campaign;

    if (tokenParam) {
      localStorage.setItem(tokenStorageKey, tokenParam);
      params.delete("token");
      const cleanQuery = params.toString();
      history.replaceState(null, "", window.location.pathname + (cleanQuery ? "?" + cleanQuery : ""));
    }

    const adminToken = localStorage.getItem(tokenStorageKey) || "";
    const containerEl = document.getElementById("container");
    const controlsEl = document.getElementById("controls");
    const subtitleEl = document.getElementById("subtitle");
    const statusTextEl = document.getElementById("statusText");
    const maxInput = document.getElementById("maxValue");
    const currentInput = document.getElementById("currentValue");
    const tubeFillEl = document.getElementById("tubeFill");
    const bulbFillEl = document.getElementById("bulbFill");
    const currentAmountTextEl = document.getElementById("currentAmountText");
    const milestoneEls = [
      document.getElementById("milestone0"),
      document.getElementById("milestone1"),
      document.getElementById("milestone2"),
      document.getElementById("milestone3"),
      document.getElementById("milestone4")
    ];

    const controlInputs = [maxInput, currentInput];
    let isEditing = false;
    let suppressRemoteUntilMs = 0;

    if (mode === "display") {
      document.body.classList.add("display-viewport");
      controlsEl.classList.add("hidden");
    } else {
      containerEl.classList.add("control-mode");
      subtitleEl.textContent = "Control mode is active. Updates are synced to the live display.";
    }

    function toPositiveNumber(value, fallback) {
      const parsed = Number(value);
      if (!Number.isFinite(parsed)) return fallback;
      return parsed > 0 ? parsed : fallback;
    }

    function toNonNegativeNumber(value, fallback) {
      const parsed = Number(value);
      if (!Number.isFinite(parsed)) return fallback;
      return parsed >= 0 ? parsed : fallback;
    }

    function clamp(value, min, max) {
      return Math.min(max, Math.max(min, value));
    }

    function normalizeState(rawState) {
      const maxValue = toPositiveNumber(rawState?.maxValue, DEFAULT_STATE.maxValue);
      const currentRaw = toNonNegativeNumber(rawState?.currentValue, DEFAULT_STATE.currentValue);
      const currentValue = clamp(currentRaw, 0, maxValue);
      return { maxValue, currentValue };
    }

    function applyStateToInputs(state) {
      maxInput.value = String(state.maxValue);
      currentInput.value = String(state.currentValue);
    }

    function readStateFromInputs() {
      return normalizeState({
        maxValue: maxInput.value,
        currentValue: currentInput.value
      });
    }

    function formatMoney(value) {
      return new Intl.NumberFormat(undefined, {
        style: "currency",
        currency: "USD",
        maximumFractionDigits: 0
      }).format(value);
    }

    function debounce(callback, delayMs) {
      let timerId;
      return (...args) => {
        clearTimeout(timerId);
        timerId = setTimeout(() => callback(...args), delayMs);
      };
    }

    function setStatus(message, type = "ok") {
      statusTextEl.innerHTML = "<strong>Status:</strong> " + message;
      if (type === "error") {
        statusTextEl.style.background = "#fff4f4";
        statusTextEl.style.borderColor = "#f3cccc";
      } else {
        statusTextEl.style.background = "#fffaf0";
        statusTextEl.style.borderColor = "#e2d5bc";
      }
    }

    function getMilestones(maxValue) {
      return [1, 5 / 6, 2 / 3, 1 / 2, 1 / 3].map((ratio) => Math.round(maxValue * ratio));
    }

    function renderMilestones(maxValue) {
      const milestoneValues = getMilestones(maxValue);
      milestoneEls.forEach((el, idx) => {
        if (el) {
          el.textContent = formatMoney(milestoneValues[idx] || 0);
        }
      });
    }

    function renderThermometer(state, options = {}) {
      const shouldSyncInputs = options.syncInputs !== false;
      const normalized = normalizeState(state);
      const fillPercent = clamp(normalized.currentValue / normalized.maxValue, 0, 1);

      tubeFillEl.style.height = (fillPercent * 100) + "%";
      currentAmountTextEl.textContent = formatMoney(normalized.currentValue);
      bulbFillEl.style.opacity = String(0.65 + fillPercent * 0.35);
      renderMilestones(normalized.maxValue);

      if (mode === "control" && shouldSyncInputs) {
        applyStateToInputs(normalized);
      }
    }

    async function fetchState() {
      const response = await fetch("/api/state?campaign=" + encodeURIComponent(campaign), { cache: "no-store" });
      if (!response.ok) {
        throw new Error("Failed to fetch");
      }
      return response.json();
    }

    async function pushState() {
      if (mode !== "control") return;
      if (!adminToken) {
        setStatus("Missing token. Open control URL with ?token=YOUR_ADMIN_WRITE_TOKEN", "error");
        return;
      }

      const state = readStateFromInputs();
      suppressRemoteUntilMs = Date.now() + (POLL_MS * 2);
      renderThermometer(state, { syncInputs: false });
      setStatus("Syncing update...");

      const response = await fetch("/api/state?campaign=" + encodeURIComponent(campaign), {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "x-admin-token": adminToken
        },
        body: JSON.stringify(state)
      });

      if (!response.ok) {
        throw new Error("Write failed");
      }

      setStatus("Live and synced.");
    }

    const debouncedPush = debounce(() => {
      pushState().catch(() => {
        setStatus("Could not sync update. Check token/connection.", "error");
      });
    }, 220);

    if (mode === "control") {
      for (const input of controlInputs) {
        input.addEventListener("focus", () => { isEditing = true; });
        input.addEventListener("blur", () => { isEditing = false; });
      }

      maxInput.addEventListener("input", debouncedPush);
      currentInput.addEventListener("input", debouncedPush);
      maxInput.addEventListener("input", () => { suppressRemoteUntilMs = Date.now() + (POLL_MS * 2); });
      currentInput.addEventListener("input", () => { suppressRemoteUntilMs = Date.now() + (POLL_MS * 2); });
      maxInput.addEventListener("change", () => {
        pushState().catch(() => setStatus("Could not sync update. Check token/connection.", "error"));
      });
      currentInput.addEventListener("change", () => {
        pushState().catch(() => setStatus("Could not sync update. Check token/connection.", "error"));
      });
    }

    async function refreshLoop() {
      try {
        const latest = await fetchState();
        const shouldSyncInputs = !(mode === "control" && (isEditing || Date.now() < suppressRemoteUntilMs));
        renderThermometer(latest, { syncInputs: shouldSyncInputs });

        if (mode === "display") {
          setStatus("Display mode live. Campaign: " + campaign);
        } else if (adminToken) {
          setStatus("Control mode live. Campaign: " + campaign);
        } else {
          setStatus("Control mode loaded, but token is missing.", "error");
        }
      } catch (_error) {
        setStatus("Unable to reach live state. Retrying...", "error");
      }
    }

    renderThermometer(DEFAULT_STATE);
    refreshLoop();
    setInterval(refreshLoop, POLL_MS);
  </script>
</body>
</html>
