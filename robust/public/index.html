<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Fundraising Thermometer</title>
  <style>
    :root {
      --ivory: #fbf7ef;
      --ivory-soft: #f6eedc;
      --gold-deep: #8e6620;
      --gold-mid: #cda34e;
      --gold-light: #f2d98f;
      --text: #1c150b;
      --muted: #69542a;
      --emerald: #1ea44f;
      --emerald-deep: #0f7437;
      --control-border: #d8dee6;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Inter", "Segoe UI", Arial, sans-serif;
      color: var(--text);
      background: linear-gradient(180deg, #faf8f2 0%, #efe6d3 100%);
    }

    body.display-viewport {
      height: 100vh;
      overflow: hidden;
      display: grid;
      place-items: center;
      padding: 0.3rem;
      background: radial-gradient(circle at 50% 18%, #fffdf8 0%, #f7efde 56%, #eee0c4 100%);
    }

    .container {
      width: min(1180px, calc(100% - 1.5rem));
      margin: 0.75rem auto;
      display: grid;
      grid-template-columns: 1fr;
      gap: 1rem;
      align-items: start;
    }

    .container.control-mode {
      grid-template-columns: minmax(300px, 360px) 1fr;
      align-items: center;
    }

    .container.display-mode {
      width: 100%;
      height: 100%;
      margin: 0;
      display: grid;
      place-items: center;
    }

    .controls {
      background: #ffffff;
      border: 1px solid var(--control-border);
      border-radius: 14px;
      box-shadow: 0 10px 28px rgba(52, 38, 11, 0.08);
      padding: 1rem;
    }

    .controls.hidden { display: none; }

    h1 {
      margin: 0;
      font-size: 1.4rem;
      font-weight: 800;
    }

    .subtitle {
      margin: 0.5rem 0 1rem;
      font-size: 0.94rem;
      color: #5e6874;
    }

    .field { margin-bottom: 0.85rem; }

    label {
      display: inline-block;
      margin-bottom: 0.4rem;
      font-size: 0.9rem;
      font-weight: 700;
    }

    input[type="number"] {
      width: 100%;
      border: 1.5px solid var(--control-border);
      border-radius: 10px;
      padding: 0.72rem 0.8rem;
      font-size: 1rem;
      color: var(--text);
      background: #fff;
    }

    input[type="number"]:focus {
      outline: none;
      border-color: #6a7b8e;
      box-shadow: 0 0 0 3px rgba(106, 123, 142, 0.18);
    }

    .status {
      margin: 0.95rem 0 0;
      padding: 0.68rem 0.75rem;
      border-radius: 10px;
      border: 1px solid #dfd8c7;
      background: #f7fbff;
      color: #3d5166;
      font-size: 0.9rem;
    }

    .display {
      position: relative;
      width: min(920px, 100%);
      max-width: 100%;
      margin: 0 auto;
      aspect-ratio: 5 / 8;
      background:
        radial-gradient(circle at 50% 14%, rgba(255, 255, 255, 0.95), rgba(251, 245, 230, 0.92) 48%, rgba(244, 232, 205, 0.9) 100%);
      border-radius: 22px;
      box-shadow: 0 18px 42px rgba(82, 58, 17, 0.2);
      overflow: hidden;
      isolation: isolate;
    }

    .container.display-mode .display {
      width: min(
        calc((100vh - 0.7rem) * 0.625),
        calc(100vw - 0.7rem)
      );
    }

    .asset {
      position: absolute;
      display: block;
      pointer-events: none;
      user-select: none;
      -webkit-user-drag: none;
    }

    .texture {
      inset: 0;
      opacity: 0.18;
    }

    .arch {
      inset: 0;
    }

    .skyline {
      width: 41%;
      right: 12%;
      bottom: 23%;
      opacity: 0.18;
    }

    .topLanternLeft {
      width: 8.8%;
      left: 9.2%;
      top: 2%;
    }

    .topLanternRight {
      width: 8.8%;
      right: 9.2%;
      top: 2%;
    }

    .smallLanternLeft {
      width: 5.2%;
      left: 7.4%;
      bottom: 7%;
      opacity: 0.9;
    }

    .smallLanternRight {
      width: 5.2%;
      right: 7.4%;
      bottom: 7%;
      opacity: 0.9;
    }

    .cornerLeft {
      width: 10.5%;
      left: 9%;
      bottom: 6.4%;
      opacity: 0.96;
    }

    .cornerRight {
      width: 10.5%;
      right: 9%;
      bottom: 6.4%;
      opacity: 0.96;
    }

    .sparkleA {
      width: 2.4%;
      left: 31%;
      top: 13.9%;
      opacity: 0.52;
    }

    .sparkleB {
      width: 2.2%;
      right: 31%;
      top: 13.6%;
      opacity: 0.48;
    }

    .sparkleDot {
      width: 1.1%;
      right: 24%;
      top: 11.7%;
      opacity: 0.44;
    }

    .title {
      position: absolute;
      top: 10.8%;
      left: 0;
      width: 100%;
      margin: 0;
      text-align: center;
      font-family: "Cormorant Garamond", "Georgia", "Times New Roman", serif;
      font-size: clamp(2rem, 4.7vw, 4rem);
      line-height: 1;
      font-weight: 700;
      letter-spacing: 0.01em;
      color: #7a5412;
      text-shadow:
        0 1px 0 rgba(255, 255, 255, 0.9),
        0 4px 14px rgba(112, 79, 21, 0.18);
    }

    .divider {
      width: 34%;
      left: 33%;
      top: 17.9%;
      opacity: 0.82;
    }

    .crescent {
      width: 11.4%;
      left: 44.3%;
      top: 18.8%;
    }

    .milestonePanel {
      position: absolute;
      top: 28.8%;
      left: 9.7%;
      width: 30.5%;
    }

    .milestoneRow {
      position: relative;
      width: 100%;
      height: clamp(48px, 4.9vw, 74px);
      margin-bottom: clamp(7px, 0.9vw, 13px);
    }

    .milestoneLine {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .milestoneValue {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center start;
      padding-left: 6%;
      font-size: clamp(1.15rem, 2.55vw, 2.15rem);
      line-height: 1;
      font-weight: 900;
      color: #1b150b;
      letter-spacing: -0.01em;
      text-shadow: 0 1px 0 rgba(255, 255, 255, 0.72);
    }

    .goalLabel {
      margin-top: clamp(10px, 1vw, 15px);
      padding-left: 6%;
      font-size: clamp(1.55rem, 3vw, 2.35rem);
      font-weight: 900;
      color: #1b150b;
    }

    .amountPlaque {
      position: absolute;
      width: 31%;
      right: 9.8%;
      top: 32%;
    }

    .amountPanel {
      width: 100%;
      display: block;
    }

    .amountFrame {
      inset: 0;
      width: 100%;
    }

    .amountText {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      text-align: center;
      line-height: 1.02;
    }

    .amountLabel {
      display: block;
      margin-bottom: 0.18em;
      font-family: "Cormorant Garamond", "Georgia", "Times New Roman", serif;
      font-size: clamp(1.08rem, 2.05vw, 1.9rem);
      font-weight: 700;
      color: #4e3910;
    }

    .amountValue {
      display: block;
      font-size: clamp(1.9rem, 4.35vw, 3.8rem);
      line-height: 1;
      font-weight: 900;
      color: #18120a;
      letter-spacing: -0.02em;
    }

    .thermometerArea {
      position: absolute;
      width: 23.5%;
      left: 38.25%;
      top: 22.3%;
      height: 61%;
    }

    .fillClip {
      position: absolute;
      left: 0;
      right: 0;
      top: 0;
      bottom: 16%;
      -webkit-mask-image: url("/ramadan_full_asset_pack/thermometer-fill-mask.svg");
      -webkit-mask-size: contain;
      -webkit-mask-repeat: no-repeat;
      -webkit-mask-position: center top;
      mask-image: url("/ramadan_full_asset_pack/thermometer-fill-mask.svg");
      mask-size: contain;
      mask-repeat: no-repeat;
      mask-position: center top;
    }

    .tubeFill {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 0;
      background:
        radial-gradient(circle at 55% 16%, rgba(196, 255, 194, 0.55), transparent 40%),
        linear-gradient(180deg, #44d06b 0%, var(--emerald) 46%, var(--emerald-deep) 100%);
      box-shadow:
        inset 0 0 22px rgba(10, 130, 55, 0.42),
        0 0 24px rgba(42, 182, 89, 0.28);
      transition: height 320ms ease;
    }

    .tubeShell {
      inset: 0;
      width: 100%;
    }

    .bulbGlow {
      position: absolute;
      width: 41%;
      aspect-ratio: 1 / 1;
      left: 29.5%;
      bottom: 7.8%;
      border-radius: 999px;
      background:
        radial-gradient(circle at 35% 32%, rgba(191, 255, 180, 0.92), rgba(98, 224, 116, 0.65) 34%, rgba(31, 164, 79, 0.82) 64%, rgba(15, 116, 55, 0.96) 100%);
      box-shadow:
        inset 0 -10px 18px rgba(4, 67, 27, 0.42),
        0 0 30px rgba(54, 200, 95, 0.34);
    }

    .bulbAsset {
      width: 55%;
      left: 22.5%;
      bottom: 2%;
    }

    .bulbCradle {
      width: 74%;
      left: 13%;
      bottom: -3%;
    }

    .flourishLeft {
      width: 9.6%;
      left: 27.5%;
      bottom: 18.8%;
      opacity: 0.84;
    }

    .flourishRight {
      width: 9.6%;
      right: 27.5%;
      bottom: 18.8%;
      opacity: 0.84;
    }

    .ctaWrap {
      position: absolute;
      left: 22%;
      bottom: 4.5%;
      width: 56%;
    }

    .ctaPlaque {
      width: 100%;
      display: block;
    }

    .ctaText {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      margin: 0;
      font-family: "Cormorant Garamond", "Georgia", "Times New Roman", serif;
      font-size: clamp(2rem, 4.4vw, 3.65rem);
      line-height: 1;
      font-weight: 700;
      color: #3b2a0d;
    }

    .meta {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 1.25%;
      text-align: center;
      font-size: clamp(0.72rem, 1.2vw, 0.9rem);
      color: #6d592d;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    @media (max-width: 980px) {
      .container.control-mode { grid-template-columns: 1fr; }
      .display { width: min(820px, 100%); }
    }
  </style>
</head>
<body>
  <main class="container" id="container">
    <section class="controls" id="controls">
      <h1>Fundraising Thermometer</h1>
      <p class="subtitle" id="subtitle">Use control mode on your phone to update the live display.</p>

      <div class="field">
        <label for="maxValue">Goal / Max Value</label>
        <input id="maxValue" type="number" min="1" step="1" value="3000000">
      </div>

      <div class="field">
        <label for="currentValue">Current Value</label>
        <input id="currentValue" type="number" min="0" step="1" value="1750000">
      </div>

      <p class="status" id="statusText"><strong>Status:</strong> Initializing...</p>
    </section>

    <section class="display" aria-live="polite" aria-label="Ramadan fundraiser display">
      <img class="asset texture" src="/ramadan_full_asset_pack/ivory-speckle-overlay.svg" alt="">
      <img class="asset arch" src="/ramadan_full_asset_pack/arch-frame-ornate.svg" alt="">
      <img class="asset skyline" src="/ramadan_full_asset_pack/mosque-skyline.svg" alt="">

      <img class="asset topLanternLeft" src="/ramadan_full_asset_pack/lantern-large-a.svg" alt="">
      <img class="asset topLanternRight" src="/ramadan_full_asset_pack/lantern-large-b.svg" alt="">
      <img class="asset sparkleA" src="/ramadan_full_asset_pack/sparkle-4pt.svg" alt="">
      <img class="asset sparkleB" src="/ramadan_full_asset_pack/sparkle-8pt.svg" alt="">
      <img class="asset sparkleDot" src="/ramadan_full_asset_pack/sparkle-dot.svg" alt="">

      <h2 class="title">Ramadan Fundraiser</h2>
      <img class="asset divider" src="/ramadan_full_asset_pack/ornament-divider-small.svg" alt="">
      <img class="asset crescent" src="/ramadan_full_asset_pack/crescent-topper.svg" alt="">

      <aside class="milestonePanel">
        <div class="milestoneRow">
          <img class="milestoneLine" src="/ramadan_full_asset_pack/milestone-line.svg" alt="">
          <span class="milestoneValue" id="milestone0">$3,000,000</span>
        </div>
        <div class="milestoneRow">
          <img class="milestoneLine" src="/ramadan_full_asset_pack/milestone-line.svg" alt="">
          <span class="milestoneValue" id="milestone1">$2,500,000</span>
        </div>
        <div class="milestoneRow">
          <img class="milestoneLine" src="/ramadan_full_asset_pack/milestone-line.svg" alt="">
          <span class="milestoneValue" id="milestone2">$2,000,000</span>
        </div>
        <div class="milestoneRow">
          <img class="milestoneLine" src="/ramadan_full_asset_pack/milestone-line.svg" alt="">
          <span class="milestoneValue" id="milestone3">$1,500,000</span>
        </div>
        <div class="milestoneRow">
          <img class="milestoneLine" src="/ramadan_full_asset_pack/milestone-line.svg" alt="">
          <span class="milestoneValue" id="milestone4">$1,000,000</span>
        </div>
        <div class="goalLabel">GOAL</div>
      </aside>

      <aside class="amountPlaque">
        <img class="amountPanel" src="/ramadan_full_asset_pack/amount-plaque-panel.svg" alt="">
        <img class="asset amountFrame" src="/ramadan_full_asset_pack/amount-plaque-frame.svg" alt="">
        <div class="amountText">
          <span class="amountLabel">Current Amount</span>
          <span class="amountValue" id="currentAmountText">$0</span>
        </div>
      </aside>

      <div class="thermometerArea">
        <div class="fillClip">
          <div class="tubeFill" id="fill"></div>
        </div>
        <img class="asset tubeShell" src="/ramadan_full_asset_pack/thermometer-shell.svg" alt="">
        <div class="bulbGlow" id="bulbGlow"></div>
        <img class="asset bulbAsset" src="/ramadan_full_asset_pack/thermometer-bulb.svg" alt="">
        <img class="asset bulbCradle" src="/ramadan_full_asset_pack/bulb-cradle.svg" alt="">
      </div>

      <img class="asset flourishLeft" src="/ramadan_full_asset_pack/flourish-left.svg" alt="">
      <img class="asset flourishRight" src="/ramadan_full_asset_pack/flourish-right.svg" alt="">
      <img class="asset smallLanternLeft" src="/ramadan_full_asset_pack/lantern-small.svg" alt="">
      <img class="asset smallLanternRight" src="/ramadan_full_asset_pack/lantern-small.svg" alt="">
      <img class="asset cornerLeft" src="/ramadan_full_asset_pack/corner-floral-left.svg" alt="">
      <img class="asset cornerRight" src="/ramadan_full_asset_pack/corner-floral-right.svg" alt="">

      <footer class="ctaWrap">
        <img class="ctaPlaque" src="/ramadan_full_asset_pack/cta-plaque.svg" alt="">
        <p class="ctaText">Donate Generously</p>
      </footer>

      <div class="meta">
        <span id="goalText">Goal: $0</span>
        &nbsp; | &nbsp;
        <span id="percentText">Progress: 0%</span>
      </div>
    </section>
  </main>

  <script>
    const DEFAULT_STATE = {
      maxValue: 3000000,
      currentValue: 1750000
    };
    const POLL_MS = 1500;
    const params = new URLSearchParams(window.location.search);
    const mode = params.get("mode") === "control" ? "control" : "display";
    const campaign = params.get("campaign") || "default";
    const tokenParam = params.get("token");
    const tokenStorageKey = "therm-admin-token:" + campaign;

    if (tokenParam) {
      localStorage.setItem(tokenStorageKey, tokenParam);
      params.delete("token");
      const cleanQuery = params.toString();
      history.replaceState(null, "", window.location.pathname + (cleanQuery ? "?" + cleanQuery : ""));
    }

    const adminToken = localStorage.getItem(tokenStorageKey) || "";
    const containerEl = document.getElementById("container");
    const controlsEl = document.getElementById("controls");
    const subtitleEl = document.getElementById("subtitle");
    const statusTextEl = document.getElementById("statusText");
    const maxInput = document.getElementById("maxValue");
    const currentInput = document.getElementById("currentValue");
    const fillEl = document.getElementById("fill");
    const bulbGlowEl = document.getElementById("bulbGlow");
    const currentAmountTextEl = document.getElementById("currentAmountText");
    const goalTextEl = document.getElementById("goalText");
    const percentTextEl = document.getElementById("percentText");
    const milestoneEls = [
      document.getElementById("milestone0"),
      document.getElementById("milestone1"),
      document.getElementById("milestone2"),
      document.getElementById("milestone3"),
      document.getElementById("milestone4")
    ];

    const controlInputs = [maxInput, currentInput];
    let isEditing = false;
    let suppressRemoteUntilMs = 0;

    if (mode === "display") {
      document.body.classList.add("display-viewport");
      controlsEl.classList.add("hidden");
      containerEl.classList.add("display-mode");
    } else {
      containerEl.classList.add("control-mode");
      subtitleEl.textContent = "Control mode is active. Updates are synced to the live display.";
    }

    function toPositiveNumber(value, fallback) {
      const parsed = Number(value);
      if (!Number.isFinite(parsed)) return fallback;
      return parsed > 0 ? parsed : fallback;
    }

    function toNonNegativeNumber(value, fallback) {
      const parsed = Number(value);
      if (!Number.isFinite(parsed)) return fallback;
      return parsed >= 0 ? parsed : fallback;
    }

    function clamp(value, min, max) {
      return Math.min(max, Math.max(min, value));
    }

    function normalizeState(rawState) {
      const maxValue = toPositiveNumber(rawState?.maxValue, DEFAULT_STATE.maxValue);
      const currentRaw = toNonNegativeNumber(rawState?.currentValue, DEFAULT_STATE.currentValue);
      const currentValue = clamp(currentRaw, 0, maxValue);
      return { maxValue, currentValue };
    }

    function applyStateToInputs(state) {
      maxInput.value = String(state.maxValue);
      currentInput.value = String(state.currentValue);
    }

    function readStateFromInputs() {
      return normalizeState({
        maxValue: maxInput.value,
        currentValue: currentInput.value
      });
    }

    function formatMoney(value) {
      return new Intl.NumberFormat(undefined, {
        style: "currency",
        currency: "USD",
        maximumFractionDigits: 0
      }).format(value);
    }

    function debounce(callback, delayMs) {
      let timerId;
      return (...args) => {
        clearTimeout(timerId);
        timerId = setTimeout(() => callback(...args), delayMs);
      };
    }

    function setStatus(message, type = "ok") {
      statusTextEl.innerHTML = "<strong>Status:</strong> " + message;
      if (type === "error") {
        statusTextEl.style.background = "#fff4f4";
        statusTextEl.style.borderColor = "#f3cccc";
      } else {
        statusTextEl.style.background = "#f7fbff";
        statusTextEl.style.borderColor = "#dfd8c7";
      }
    }

    function niceStep(rawStep) {
      const safeStep = Math.max(1, rawStep);
      const magnitude = 10 ** Math.floor(Math.log10(safeStep));
      const normalized = safeStep / magnitude;

      if (normalized <= 1) return 1 * magnitude;
      if (normalized <= 2) return 2 * magnitude;
      if (normalized <= 5) return 5 * magnitude;
      return 10 * magnitude;
    }

    function getMilestones(maxValue) {
      const step = niceStep(maxValue / 6);
      return [
        maxValue,
        Math.max(0, maxValue - step),
        Math.max(0, maxValue - (step * 2)),
        Math.max(0, maxValue - (step * 3)),
        Math.max(0, maxValue - (step * 4))
      ];
    }

    function renderMilestones(maxValue) {
      const milestoneValues = getMilestones(maxValue);
      milestoneEls.forEach((el, idx) => {
        if (el) {
          el.textContent = formatMoney(milestoneValues[idx] || 0);
        }
      });
    }

    function renderThermometer(state, options = {}) {
      const shouldSyncInputs = options.syncInputs !== false;
      const normalized = normalizeState(state);
      const fillPercent = clamp(normalized.currentValue / normalized.maxValue, 0, 1);

      fillEl.style.height = (fillPercent * 100) + "%";
      bulbGlowEl.style.opacity = String(0.72 + fillPercent * 0.28);
      currentAmountTextEl.textContent = formatMoney(normalized.currentValue);
      goalTextEl.textContent = "Goal: " + formatMoney(normalized.maxValue);
      percentTextEl.textContent = "Progress: " + Math.round(fillPercent * 100) + "%";
      renderMilestones(normalized.maxValue);

      if (mode === "control" && shouldSyncInputs) {
        applyStateToInputs(normalized);
      }
    }

    async function fetchState() {
      const response = await fetch("/api/state?campaign=" + encodeURIComponent(campaign), { cache: "no-store" });
      if (!response.ok) throw new Error("Failed to fetch");
      return response.json();
    }

    async function pushState() {
      if (mode !== "control") return;
      if (!adminToken) {
        setStatus("Missing token. Open control URL with ?token=YOUR_ADMIN_WRITE_TOKEN", "error");
        return;
      }

      const state = readStateFromInputs();
      suppressRemoteUntilMs = Date.now() + (POLL_MS * 2);
      renderThermometer(state, { syncInputs: false });
      setStatus("Syncing update...");

      const response = await fetch("/api/state?campaign=" + encodeURIComponent(campaign), {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "x-admin-token": adminToken
        },
        body: JSON.stringify(state)
      });

      if (!response.ok) throw new Error("Write failed");
      setStatus("Live and synced.");
    }

    const debouncedPush = debounce(() => {
      pushState().catch(() => setStatus("Could not sync update. Check token/connection.", "error"));
    }, 220);

    if (mode === "control") {
      for (const input of controlInputs) {
        input.addEventListener("focus", () => { isEditing = true; });
        input.addEventListener("blur", () => { isEditing = false; });
      }
      maxInput.addEventListener("input", debouncedPush);
      currentInput.addEventListener("input", debouncedPush);
      maxInput.addEventListener("input", () => { suppressRemoteUntilMs = Date.now() + (POLL_MS * 2); });
      currentInput.addEventListener("input", () => { suppressRemoteUntilMs = Date.now() + (POLL_MS * 2); });
      maxInput.addEventListener("change", () => pushState().catch(() => setStatus("Could not sync update. Check token/connection.", "error")));
      currentInput.addEventListener("change", () => pushState().catch(() => setStatus("Could not sync update. Check token/connection.", "error")));
    }

    async function refreshLoop() {
      try {
        const latest = await fetchState();
        const shouldSyncInputs = !(mode === "control" && (isEditing || Date.now() < suppressRemoteUntilMs));
        renderThermometer(latest, { syncInputs: shouldSyncInputs });

        if (mode === "display") {
          setStatus("Display mode live. Campaign: " + campaign);
        } else if (adminToken) {
          setStatus("Control mode live. Campaign: " + campaign);
        } else {
          setStatus("Control mode loaded, but token is missing.", "error");
        }
      } catch (_error) {
        setStatus("Unable to reach live state. Retrying...", "error");
      }
    }

    renderThermometer(DEFAULT_STATE);
    refreshLoop();
    setInterval(refreshLoop, POLL_MS);
  </script>
</body>
