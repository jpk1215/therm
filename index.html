<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Fundraising Thermometer</title>
  <style>
    :root {
      --bg: #ecf7f0;
      --card: #ffffff;
      --text: #08371e;
      --muted: #3f5d4b;
      --primary: #01411c;
      --track: #d9e8de;
      --tick: #5f7d6b;
      --border: #c9ddd0;
      --shadow: 0 16px 40px rgba(1, 65, 28, 0.12);
      --radius: 18px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      color: var(--text);
      background: linear-gradient(180deg, #ffffff, var(--bg));
    }

    .container {
      width: min(1080px, 100% - 2.5rem);
      margin: 2rem auto 3rem;
      display: grid;
      grid-template-columns: minmax(300px, 380px) 1fr;
      gap: 1.5rem;
      align-items: start;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .controls {
      padding: 1.6rem;
    }

    .controls.hidden {
      display: none;
    }

    h1 {
      margin: 0 0 0.5rem;
      font-size: 1.6rem;
      line-height: 1.15;
      letter-spacing: -0.01em;
    }

    .subtitle {
      margin: 0 0 1.35rem;
      color: var(--muted);
      font-size: 1rem;
    }

    .field {
      margin-bottom: 1.05rem;
    }

    label {
      display: inline-block;
      margin-bottom: 0.45rem;
      font-size: 0.93rem;
      font-weight: 600;
    }

    input[type="number"] {
      width: 100%;
      padding: 0.82rem 0.9rem;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      font-size: 1rem;
      color: var(--text);
      background: #fff;
      transition: border-color 150ms ease, box-shadow 150ms ease;
    }

    input[type="number"]:focus {
      outline: none;
      border-color: #0b6f35;
      box-shadow: 0 0 0 4px rgba(11, 111, 53, 0.12);
    }

    .status {
      margin-top: 1.15rem;
      margin-bottom: 0;
      padding: 0.75rem 0.85rem;
      background: #f3faf5;
      border: 1px solid #d7e9dc;
      border-radius: 12px;
      font-size: 0.92rem;
      color: var(--muted);
    }

    .status strong {
      color: var(--text);
    }

    .display {
      padding: 1.6rem 1.6rem 1.4rem 2.2rem;
      min-height: 580px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      position: relative;
      overflow: hidden;
    }

    .display::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      bottom: 0;
      width: 24px;
      background: linear-gradient(180deg, #036a2f, var(--primary));
    }

    .display::after {
      content: "☪ ★";
      position: absolute;
      top: 0.9rem;
      right: 1rem;
      font-size: 1.05rem;
      color: rgba(1, 65, 28, 0.7);
      letter-spacing: 0.08rem;
    }

    .amounts {
      display: flex;
      flex-wrap: wrap;
      gap: 0.8rem 0.95rem;
      margin-bottom: 1.2rem;
      font-size: 0.95rem;
    }

    .amounts > div {
      padding: 0.7rem 0.82rem;
      border: 1px solid #d8e8dd;
      border-radius: 12px;
      background: #f8fcf9;
      min-width: 138px;
    }

    .amounts > div span:first-child {
      color: var(--muted);
      font-weight: 600;
    }

    .amounts .value {
      font-size: 1.24rem;
      font-weight: 700;
      color: var(--text);
    }

    .thermometer-wrap {
      flex: 1;
      min-height: 390px;
      display: flex;
      justify-content: center;
      align-items: flex-end;
      padding: 1rem 0.8rem 0.4rem;
    }

    .thermometer {
      position: relative;
      width: min(420px, 100%);
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 1rem;
    }

    .scale {
      position: relative;
      height: clamp(300px, 52vh, 500px);
      width: 146px;
    }

    .track {
      position: absolute;
      right: 0;
      bottom: 46px;
      width: 58px;
      height: calc(100% - 56px);
      background: var(--track);
      border-radius: 999px;
      border: 1px solid #cadecf;
      box-shadow: inset 0 0 0 2px rgba(255, 255, 255, 0.5);
      overflow: hidden;
    }

    .fill {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 0;
      background: linear-gradient(180deg, #11a04a, var(--primary));
      border-top: 2px solid rgba(255, 255, 255, 0.35);
      transition: height 250ms ease;
    }

    .bulb {
      position: absolute;
      right: -9px;
      bottom: 0;
      width: 76px;
      height: 76px;
      border-radius: 50%;
      background: var(--primary);
      border: 1px solid #013017;
      box-shadow: inset 0 -6px 10px rgba(0, 0, 0, 0.16);
    }

    .tick-list {
      position: absolute;
      left: 0;
      right: 70px;
      bottom: 56px;
      height: calc(100% - 66px);
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .tick-list li {
      position: absolute;
      left: 0;
      transform: translateY(50%);
      display: flex;
      align-items: center;
      gap: 0.4rem;
      white-space: nowrap;
      color: var(--tick);
      font-size: 0.84rem;
      font-weight: 600;
      line-height: 1;
    }

    .tick-mark {
      width: 24px;
      height: 2px;
      background: var(--tick);
    }

    @media (max-width: 780px) {
      .container {
        grid-template-columns: 1fr;
        width: min(700px, 100% - 1.25rem);
      }

      .display {
        min-height: 500px;
      }
    }

    .container.display-mode {
      grid-template-columns: 1fr;
      width: min(760px, 100% - 2rem);
    }

    @media (max-width: 430px) {
      .controls,
      .display {
        padding: 1rem;
      }

      h1 {
        font-size: 1.32rem;
      }

      .display::before {
        width: 14px;
      }

      .scale {
        width: 122px;
      }

      .track {
        width: 50px;
      }

      .bulb {
        width: 66px;
        height: 66px;
      }
    }
  </style>
</head>
<body>
  <main class="container">
    <section class="card controls">
      <h1>Fundraising Thermometer</h1>
      <p class="subtitle">Set your goal, increment spacing, and current amount.</p>

      <div class="field">
        <label for="maxValue">Goal / Max Value</label>
        <input id="maxValue" type="number" min="1" step="1" value="100000">
      </div>

      <div class="field">
        <label for="incrementValue">Increment</label>
        <input id="incrementValue" type="number" min="1" step="1" value="10000">
      </div>

      <div class="field">
        <label for="currentValue">Current Value</label>
        <input id="currentValue" type="number" min="0" step="1" value="1250">
      </div>

      <p class="status" id="statusText"><strong>Tip:</strong> values update smoothly as you type.</p>
    </section>

    <section class="card display" aria-live="polite">
      <div class="amounts">
        <div><span>Raised:</span> <span class="value" id="raisedText">$0</span></div>
        <div><span>Goal:</span> <span class="value" id="goalText">$0</span></div>
        <div><span>Progress:</span> <span class="value" id="percentText">0%</span></div>
      </div>

      <div class="thermometer-wrap">
        <div class="thermometer">
          <div class="scale">
            <ul class="tick-list" id="tickList"></ul>
            <div class="track">
              <div class="fill" id="fill"></div>
            </div>
            <div class="bulb"></div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import {
      getDatabase,
      onValue,
      ref,
      set,
      serverTimestamp
    } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-database.js";

    const firebaseConfig = {
      apiKey: "REPLACE_WITH_FIREBASE_API_KEY",
      authDomain: "REPLACE_WITH_PROJECT_ID.firebaseapp.com",
      databaseURL: "https://REPLACE_WITH_DATABASE_NAME-default-rtdb.firebaseio.com",
      projectId: "REPLACE_WITH_PROJECT_ID",
      appId: "REPLACE_WITH_APP_ID"
    };

    const HAS_FIREBASE_CONFIG = !Object.values(firebaseConfig).some((value) =>
      String(value).includes("REPLACE_WITH_")
    );

    const DEFAULT_STATE = {
      maxValue: 100000,
      incrementValue: 10000,
      currentValue: 1250
    };

    const urlParams = new URLSearchParams(window.location.search);
    const mode = urlParams.get("mode") === "display" ? "display" : "control";
    const campaignId = urlParams.get("campaign") || "default";

    const containerEl = document.querySelector(".container");
    const controlsEl = document.querySelector(".controls");
    const maxInput = document.getElementById("maxValue");
    const incrementInput = document.getElementById("incrementValue");
    const currentInput = document.getElementById("currentValue");
    const statusTextEl = document.getElementById("statusText");

    const fillEl = document.getElementById("fill");
    const tickListEl = document.getElementById("tickList");
    const raisedTextEl = document.getElementById("raisedText");
    const goalTextEl = document.getElementById("goalText");
    const percentTextEl = document.getElementById("percentText");

    let db;
    let stateRef;

    if (mode === "display") {
      controlsEl.classList.add("hidden");
      containerEl.classList.add("display-mode");
    }

    function toPositiveNumber(value, fallback) {
      const parsed = Number(value);
      if (!Number.isFinite(parsed)) {
        return fallback;
      }
      return parsed > 0 ? parsed : fallback;
    }

    function toNonNegativeNumber(value, fallback) {
      const parsed = Number(value);
      if (!Number.isFinite(parsed)) {
        return fallback;
      }
      return parsed >= 0 ? parsed : fallback;
    }

    function formatMoney(value) {
      return new Intl.NumberFormat(undefined, {
        style: "currency",
        currency: "USD",
        maximumFractionDigits: 0
      }).format(value);
    }

    function debounce(callback, delayMs) {
      let timerId;
      return (...args) => {
        clearTimeout(timerId);
        timerId = setTimeout(() => {
          callback(...args);
        }, delayMs);
      };
    }

    function setStatus(message, kind = "info") {
      if (kind === "error") {
        statusTextEl.innerHTML = "<strong>Status:</strong> " + message;
        statusTextEl.style.background = "#fff4f4";
        statusTextEl.style.borderColor = "#f3cccc";
      } else {
        statusTextEl.innerHTML = "<strong>Status:</strong> " + message;
        statusTextEl.style.background = "#f3faf5";
        statusTextEl.style.borderColor = "#d7e9dc";
      }
    }

    function normalizeState(rawState) {
      const maxValue = toPositiveNumber(rawState?.maxValue, DEFAULT_STATE.maxValue);
      const incrementValue = toPositiveNumber(rawState?.incrementValue, DEFAULT_STATE.incrementValue);
      const currentValueRaw = toNonNegativeNumber(rawState?.currentValue, DEFAULT_STATE.currentValue);
      const currentValue = Math.min(currentValueRaw, maxValue);
      return { maxValue, incrementValue, currentValue };
    }

    function readStateFromInputs() {
      return normalizeState({
        maxValue: maxInput.value,
        incrementValue: incrementInput.value,
        currentValue: currentInput.value
      });
    }

    function applyStateToInputs(state) {
      maxInput.value = String(state.maxValue);
      incrementInput.value = String(state.incrementValue);
      currentInput.value = String(state.currentValue);
    }

    function createTicks(maxValue, incrementValue) {
      tickListEl.innerHTML = "";
      const totalTicks = Math.max(1, Math.ceil(maxValue / incrementValue));

      for (let i = 0; i <= totalTicks; i += 1) {
        const raw = i * incrementValue;
        const tickValue = raw > maxValue ? maxValue : raw;
        const positionPercent = (tickValue / maxValue) * 100;

        const li = document.createElement("li");
        li.style.bottom = positionPercent + "%";

        const mark = document.createElement("span");
        mark.className = "tick-mark";

        const label = document.createElement("span");
        label.textContent = formatMoney(tickValue);

        li.appendChild(mark);
        li.appendChild(label);
        tickListEl.appendChild(li);

        if (tickValue >= maxValue) {
          break;
        }
      }
    }

    function renderThermometer(state) {
      const { maxValue, incrementValue, currentValue } = normalizeState(state);
      const percent = (currentValue / maxValue) * 100;
      fillEl.style.height = percent + "%";

      raisedTextEl.textContent = formatMoney(currentValue);
      goalTextEl.textContent = formatMoney(maxValue);
      percentTextEl.textContent = Math.round(percent) + "%";

      createTicks(maxValue, incrementValue);
    }

    function pushInputState() {
      if (mode !== "control" || !stateRef) {
        return;
      }
      const state = readStateFromInputs();
      applyStateToInputs(state);
      renderThermometer(state);
      setStatus("Syncing update...");
      set(stateRef, {
        ...state,
        updatedAt: serverTimestamp()
      })
        .then(() => {
          setStatus("Live and synced.");
        })
        .catch(() => {
          setStatus("Could not sync. Check your connection.", "error");
        });
    }

    const debouncedPushInputState = debounce(pushInputState, 180);

    maxInput.addEventListener("input", debouncedPushInputState);
    incrementInput.addEventListener("input", debouncedPushInputState);
    currentInput.addEventListener("input", debouncedPushInputState);

    maxInput.addEventListener("change", pushInputState);
    incrementInput.addEventListener("change", pushInputState);
    currentInput.addEventListener("change", pushInputState);

    if (!HAS_FIREBASE_CONFIG) {
      renderThermometer(DEFAULT_STATE);
      applyStateToInputs(DEFAULT_STATE);
      if (mode === "display") {
        setStatus("Firebase config missing. Add config values to enable live display.", "error");
      } else {
        setStatus("Firebase config missing. Add config values to enable phone sync.", "error");
      }
    } else {
      const app = initializeApp(firebaseConfig);
      db = getDatabase(app);
      stateRef = ref(db, "campaigns/" + campaignId);

      setStatus(
        mode === "display"
          ? "Display mode connected. Waiting for remote updates..."
          : "Control mode connected. Changes sync live."
      );

      onValue(
        stateRef,
        (snapshot) => {
          const snapshotValue = snapshot.val();
          if (!snapshotValue) {
            const seededState = readStateFromInputs();
            renderThermometer(seededState);
            applyStateToInputs(seededState);
            if (mode === "control") {
              set(stateRef, {
                ...seededState,
                updatedAt: serverTimestamp()
              })
                .then(() => setStatus("Live and synced."))
                .catch(() =>
                  setStatus("Connected, but initial sync failed.", "error")
                );
            } else {
              setStatus("Waiting for controller to publish first update...");
            }
            return;
          }

          const normalized = normalizeState(snapshotValue);
          applyStateToInputs(normalized);
          renderThermometer(normalized);
          setStatus(
            mode === "display"
              ? "Live display active."
              : "Live and synced."
          );
        },
        () => {
          setStatus("Connection issue. Retrying...", "error");
        }
      );
    }
  </script>
</body>
</html>
